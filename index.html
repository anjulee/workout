<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Track</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#fafaf9;--surface:#fff;--surface2:#f4f4f2;--surface3:#ebebea;
  --border:#e5e5e3;--border2:#c8c8c6;
  --text:#1a1a18;--muted:#6b6b68;--hint:#b0b0ae;
  --accent:#1a1a18;--accent-text:#fafaf9;
  --green:#2d7d52;--green-bg:#edf7f1;--green-bd:#b8e0cb;
  --amber:#7a5800;--amber-bg:#fdf6e3;--amber-bd:#e0c870;
  --blue:#1a4d8f;--blue-bg:#eef4fd;--blue-bd:#b8d0f0;
  --red:#992222;--red-bg:#fdf0f0;--red-bd:#f0c0c0;
  --purple:#5b3ea8;--purple-bg:#f2effe;--purple-bd:#c9b8f0;
  --pink:#a0307a;--pink-bg:#fdf0f8;--pink-bd:#f0b8e0;
  --teal:#0f6e6e;--teal-bg:#e8f7f7;--teal-bd:#a0d8d8;
  --r:14px;--rsm:9px;--rxs:7px;
  --mono:'Geist Mono',monospace;--sans:'Geist',sans-serif;
  --tabh:58px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}
.scr{display:none;flex:1;flex-direction:column;overflow:hidden}
.scr.on{display:flex}
.scroll{flex:1;overflow-y:auto;padding:0 16px 96px;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
.top{padding:14px 16px 6px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.top-title{font-size:17px;font-weight:500}
.icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icon-btn:active{background:var(--surface2)}
.tabbar{height:var(--tabh);border-top:1px solid var(--border);display:flex;background:var(--surface);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;color:var(--hint);font-family:var(--sans);padding:0;transition:color .15s}
.tab.on{color:var(--text)}
.tab svg{width:20px;height:20px}
.tab-lbl{font-size:10px;font-weight:500;letter-spacing:.02em}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.card-body{padding:14px 16px}
.card-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.card-row:last-child{border-bottom:none}
.crt{cursor:pointer;transition:background .12s}
.crt:active{background:var(--surface2)}
.chip{display:inline-flex;align-items:center;font-size:10px;font-weight:500;font-family:var(--mono);padding:3px 8px;border-radius:20px;border:1px solid;letter-spacing:.03em}
.cg{color:var(--green);background:var(--green-bg);border-color:var(--green-bd)}
.ca{color:var(--amber);background:var(--amber-bg);border-color:var(--amber-bd)}
.cb{color:var(--blue);background:var(--blue-bg);border-color:var(--blue-bd)}
.cm{color:var(--muted);background:var(--surface2);border-color:var(--border)}
.cr{color:var(--red);background:var(--red-bg);border-color:var(--red-bd)}
.cp{color:var(--purple);background:var(--purple-bg);border-color:var(--purple-bd)}
.cpk{color:var(--pink);background:var(--pink-bg);border-color:var(--pink-bd)}
.ct{color:var(--teal);background:var(--teal-bg);border-color:var(--teal-bd)}
.slbl{font-size:10px;font-weight:500;color:var(--hint);font-family:var(--mono);letter-spacing:.09em;text-transform:uppercase;margin:18px 0 8px}
.slbl:first-child{margin-top:6px}
input,select,textarea{-webkit-appearance:none;appearance:none;font-family:var(--sans)}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rxs);color:var(--text);font-family:var(--mono);font-size:15px;text-align:center;padding:10px 4px;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--border2);background:var(--surface)}
.inp::placeholder{color:var(--hint);font-size:11px}
.inp-full{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-size:14px;padding:12px 14px;outline:none;transition:border-color .15s;resize:none}
.inp-full:focus{border-color:var(--border2);background:var(--surface)}
select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-size:14px;padding:12px 14px;outline:none;cursor:pointer}
.btn{width:100%;padding:14px;border:none;border-radius:var(--rsm);font-family:var(--sans);font-size:15px;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:.01em}
.btn:active{transform:scale(.98)}
.btn-dark{background:var(--accent);color:var(--accent-text)}
.btn-out{background:transparent;border:1px solid var(--border2);color:var(--text)}
.btn-out:active{background:var(--surface2)}
.btn-del{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red)}
.btn-sm{padding:9px 14px;font-size:12px;border-radius:var(--rxs);width:auto}
.sets-hd{display:grid;grid-template-columns:26px 1fr 1fr 36px;gap:6px;padding:0 16px;margin-bottom:4px}
.sh{font-size:10px;color:var(--hint);font-family:var(--mono);text-align:center}
.set-row{display:grid;grid-template-columns:26px 1fr 1fr 36px;gap:6px;align-items:center;margin-bottom:5px;padding:0 16px}
.sn{font-family:var(--mono);font-size:11px;color:var(--hint);text-align:center}
.tick{width:36px;height:40px;background:transparent;border:1px solid var(--border);border-radius:var(--rxs);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.tick.done{background:var(--green-bg);border-color:var(--green-bd)}
.prog-wrap{height:2px;background:var(--surface3);border-radius:2px;margin:0 0 14px}
.prog-bar{height:2px;background:var(--text);border-radius:2px;transition:width .3s}
.steps-big{font-family:var(--mono);font-size:38px;font-weight:500;text-align:center;width:100%;border:none;background:transparent;color:var(--text);outline:none;padding:6px 0}
.steps-sub{font-size:12px;color:var(--muted);text-align:center;margin-top:2px;margin-bottom:8px}
.hrow{padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.hrow:last-child{border-bottom:none}
.hrow:active{background:var(--surface2)}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:flex-end;justify-content:center}
.mbg.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:16px 16px 44px}
.mhandle{width:32px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.mtitle{font-size:16px;font-weight:500;margin-bottom:16px}
.chart-wrap{padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px}
.chart-title{font-size:12px;font-weight:500;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.chart-canvas{position:relative;height:150px}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px}
.cstat{background:var(--surface2);border-radius:var(--rsm);padding:12px;text-align:center}
.cval{font-family:var(--mono);font-size:22px;font-weight:500}
.clbl{font-size:11px;color:var(--muted);margin-top:2px}
.fab{position:fixed;bottom:calc(var(--tabh)+14px);right:16px;width:50px;height:50px;background:var(--accent);border:none;border-radius:50%;color:var(--accent-text);font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;transition:transform .15s;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.fab:active{transform:scale(.92)}
.toast{position:fixed;bottom:calc(var(--tabh)+12px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--accent-text);font-size:13px;padding:9px 20px;border-radius:40px;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.show{opacity:1}
.empty{padding:52px 24px;text-align:center}
.empty svg{margin:0 auto 12px;display:block;opacity:.35}
.empty-txt{font-size:14px;color:var(--muted)}
.lbl{font-size:12px;color:var(--muted);margin-bottom:5px}
.gap{height:8px}
/* date nav */
.date-nav{display:flex;align-items:center;justify-content:space-between;padding:6px 16px 10px;flex-shrink:0;border-bottom:1px solid var(--border);margin-bottom:2px}
.date-nav-lbl{font-size:13px;font-weight:500;cursor:pointer;padding:4px 8px;border-radius:var(--rxs);transition:background .12s}
.date-nav-lbl:active{background:var(--surface2)}
.past-date{color:var(--blue)}
.dnav-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center}
.dnav-btn:active{background:var(--surface2)}
.dnav-btn:disabled{opacity:.3;cursor:default}
/* calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 14px;flex-shrink:0}
.cal-month-lbl{font-size:15px;font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 10px 8px}
.cal-dow{font-size:10px;color:var(--hint);font-family:var(--mono);text-align:center;padding:4px 0 6px;font-weight:500}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;position:relative;transition:background .12s;font-size:13px}
.cal-day:active{background:var(--surface3)}
.cal-day.empty{pointer-events:none}
.cal-day.today .cal-dn{background:var(--text);color:var(--accent-text);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.cal-day.selected .cal-dn{background:var(--blue);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.cal-dn{font-size:13px;line-height:1}
.cal-dots{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center;max-width:28px}
.cal-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.cal-day.future{opacity:.35;pointer-events:none}
.cal-day.pre-jan{opacity:.2;pointer-events:none}
.cal-status-bar{display:flex;gap:6px;flex-wrap:wrap;padding:0 16px 10px;flex-shrink:0}
.cal-legend{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
.cal-day-detail{flex:1;overflow-y:auto;padding:0 16px 96px}
/* status buttons */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.status-btn{padding:12px;border-radius:var(--rsm);border:1px solid var(--border);background:transparent;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:500;transition:all .15s;text-align:center}
.status-btn:active{transform:scale(.97)}
.status-btn.sel-sick{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.status-btn.sel-travel{background:var(--purple-bg);border-color:var(--purple-bd);color:var(--purple)}
.status-btn.sel-rest{background:var(--surface2);border-color:var(--border2);color:var(--muted)}
.status-btn.sel-active{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
.status-btn.sel-linasick{background:var(--pink-bg);border-color:var(--pink-bd);color:var(--pink)}
/* feelings */
.mood-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.mood-row:last-child{border-bottom:none}
.mood-time{font-size:12px;font-weight:500;color:var(--muted);width:80px;flex-shrink:0}
.mood-btns{display:flex;gap:6px;flex:1}
.mood-btn{flex:1;padding:8px 0;border-radius:var(--rxs);border:1px solid var(--border);background:var(--surface2);font-size:16px;cursor:pointer;transition:all .15s;text-align:center}
.mood-btn.sel{border-width:2px;background:var(--surface)}
.mood-btn.sel-1{border-color:#c44;background:#fff5f5}
.mood-btn.sel-2{border-color:#c96;background:#fff8f0}
.mood-btn.sel-3{border-color:#999;background:#f8f8f8}
.mood-btn.sel-4{border-color:#6a9;background:#f0faf4}
.mood-btn.sel-5{border-color:#4a8;background:#e8f9f0}
/* meal */
.meal-slot{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.meal-slot-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;transition:background .12s}
.meal-slot-head:active{background:var(--surface2)}
.meal-slot-time{font-size:11px;color:var(--hint);font-family:var(--mono)}
.meal-slot-name{font-size:13px;font-weight:500}
.meal-slot-status{font-size:11px}
.meal-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.meal-body.open{display:block}
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}
.macro-cell{background:var(--surface2);border-radius:var(--rxs);padding:8px 4px;text-align:center}
.macro-val{font-family:var(--mono);font-size:14px;font-weight:500}
.macro-lbl{font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.macro-inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rxs);color:var(--text);font-family:var(--mono);font-size:14px;text-align:center;padding:8px 2px;outline:none}
.macro-inp:focus{border-color:var(--border2);background:var(--surface)}
</style>
</head>
<body>
<div class="app">

<!-- TODAY -->
<div class="scr on" id="scr-today">
  <div class="top">
    <div class="top-title" id="today-top-title">Today</div>
    <button class="icon-btn" onclick="openStepsModal()" title="Log steps">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="date-nav">
    <button class="dnav-btn" id="dnav-prev" onclick="shiftDay(-1)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="date-nav-lbl" id="dnav-lbl" onclick="goToday()"></span>
    <button class="dnav-btn" id="dnav-next" onclick="shiftDay(1)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <div class="scroll"><div id="today-body"></div></div>
</div>

<!-- LOG -->
<div class="scr" id="scr-log">
  <div class="top">
    <div class="top-title" id="log-title">Log workout</div>
    <button class="icon-btn" onclick="closeLog()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1 1l11 11M12 1L1 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="scroll" id="log-body"></div>
  <div style="padding:10px 16px 24px;flex-shrink:0;border-top:1px solid var(--border)">
    <button class="btn btn-dark" id="log-save-btn" onclick="saveWorkout()">Save workout</button>
  </div>
</div>

<!-- CALENDAR -->
<div class="scr" id="scr-calendar">
  <div class="top"><div class="top-title">Calendar</div></div>
  <div class="cal-nav">
    <button class="icon-btn" onclick="shiftMonth(-1)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="cal-month-lbl" id="cal-month-lbl"></span>
    <button class="icon-btn" id="cal-next-btn" onclick="shiftMonth(1)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="cal-status-bar">
    <span class="cal-legend"><span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--green);margin-right:2px"></span>Workout</span>
    <span class="cal-legend"><span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--red);margin-right:2px"></span>Sick</span>
    <span class="cal-legend"><span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--pink);margin-right:2px"></span>Lina sick</span>
    <span class="cal-legend"><span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--purple);margin-right:2px"></span>Travel</span>
    <span class="cal-legend"><span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--amber);margin-right:2px"></span>Rest</span>
  </div>
  <div style="height:1px;background:var(--border);flex-shrink:0"></div>
  <div class="cal-day-detail scroll" id="cal-detail"></div>
</div>

<!-- HISTORY -->
<div class="scr" id="scr-history">
  <div class="top"><div class="top-title">History</div></div>
  <div class="scroll"><div id="hist-body"></div></div>
</div>

<!-- PROGRESS -->
<div class="scr" id="scr-progress">
  <div class="top"><div class="top-title">Progress</div></div>
  <div class="scroll"><div id="prog-body"></div></div>
</div>

<!-- TABBAR -->
<div class="tabbar">
  <button class="tab on" onclick="goTab('today')" id="tab-today">
    <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="14" height="14" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M7 10h6M7 13h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <span class="tab-lbl">Today</span>
  </button>
  <button class="tab" onclick="goTab('calendar')" id="tab-calendar">
    <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 2v4M13 2v4M3 9h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <span class="tab-lbl">Calendar</span>
  </button>
  <button class="tab" onclick="goTab('history')" id="tab-history">
    <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 6v4l2.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <span class="tab-lbl">History</span>
  </button>
  <button class="tab" onclick="goTab('progress')" id="tab-progress">
    <svg viewBox="0 0 20 20" fill="none"><path d="M3 15l4-5 4 3 4-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span class="tab-lbl">Progress</span>
  </button>
</div>
</div>

<button class="fab" id="fab" onclick="openNewModal()">+</button>
<div class="toast" id="toast"></div>

<!-- MODAL: Steps -->
<div class="mbg" id="m-steps">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Log steps</div>
    <div style="display:flex;justify-content:center;margin-bottom:4px"><canvas id="steps-ring" width="130" height="130"></canvas></div>
    <input class="steps-big" type="number" inputmode="numeric" id="steps-inp" placeholder="0" oninput="updateRing()">
    <div class="steps-sub">Goal: 10,000 steps</div>
    <div class="gap"></div>
    <button class="btn btn-dark" onclick="saveSteps()">Save</button>
    <div class="gap"></div>
    <button class="btn btn-out" onclick="closeM('m-steps')">Cancel</button>
  </div>
</div>

<!-- MODAL: New workout -->
<div class="mbg" id="m-new">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">New workout</div>
    <div class="lbl">Type</div>
    <select id="nw-type" onchange="updateNewForm()">
      <option value="plan">My plan day</option>
      <option value="strength">Custom strength</option>
      <option value="cardio">Cardio</option>
      <option value="wellness">Wellness & recovery</option>
    </select>
    <div id="nw-plan" style="margin-top:12px"><div class="lbl">Day</div><select id="nw-plan-day"></select></div>
    <div id="nw-strength" style="display:none;margin-top:12px"><div class="lbl">Name</div><input class="inp-full" type="text" id="nw-name" placeholder="e.g. Push day…"></div>
    <div id="nw-cardio" style="display:none;margin-top:12px"><div class="lbl">Activity</div>

      <select id="nw-wellness-activity"><option>Yoga</option><option>Pilates</option><option>Gyrotonic</option><option>Spa</option><option>Massage</option><option>Acupuncture</option><option>Stretching</option><option>Meditation</option><option>Other</option></select></div>

      <div class="macro-cell"><input class="macro-inp" type="number" inputmode="decimal" id="meal-protein" placeholder="0g"><div class="macro-lbl">Protein</div></div>
      <div class="macro-cell"><input class="macro-inp" type="number" inputmode="decimal" id="meal-carbs" placeholder="0g"><div class="macro-lbl">Carbs</div></div>

<script>
var STEPS_GOAL=10000;
var MIN_DATE='2026-01-01';
var MOOD_EMOJI=['','😔','😕','😐','🙂','😄'];
var MOOD_LABELS=['','Low','Tired','Okay','Good','Great'];
var MEAL_SLOTS=[
  {id:'breakfast',name:'Breakfast',time:'09:00'},
  {id:'lunch',name:'Lunch',time:'12:00'},
  {id:'snack',name:'Snack',time:'15:00'},
  {id:'dinner',name:'Dinner',time:'18:00'},
];
var SLEEP_QUALITY=['','😴','😕','😐','🙂','⭐'];
var SLEEP_QUALITY_LABELS=['','Poor','Light','Okay','Good','Great'];

var db={workouts:[],steps:{},dayStatus:{},feelings:{},meals:{},sleep:{}};
try{var raw=localStorage.getItem('trk5');if(raw)db=JSON.parse(raw);}catch(e){}
if(!db.workouts)db.workouts=[];
if(!db.steps)db.steps={};
if(!db.dayStatus)db.dayStatus={};
if(!db.feelings)db.feelings={};
if(!db.meals)db.meals={};
if(!db.sleep)db.sleep={};

// migrate
try{var old=localStorage.getItem('trk4');if(old){var od=JSON.parse(old);if(od.workouts&&!db.workouts.length)db.workouts=od.workouts;if(od.steps&&!Object.keys(db.steps).length)db.steps=od.steps;if(od.dayStatus&&!Object.keys(db.dayStatus).length)db.dayStatus=od.dayStatus;save();}}catch(e){}

function save(){try{localStorage.setItem('trk5',JSON.stringify(db));}catch(e){}}

var PLAN=[
  {id:'mon',day:'Monday',label:'Strength & Power',sections:[
    {name:'Main lifts',exercises:[{name:'Barbell Squat',sets:4,reph:'6-8'},{name:'Barbell Bench Press',sets:4,reph:'6-8'},{name:'Hip Thrust',sets:4,reph:'6-8'},{name:'Assisted Pull-Ups',sets:4,reph:'6-8'}]},
    {name:'Accessory',exercises:[{name:'Hanging Leg Raises',sets:3,reph:'12',nw:true},{name:'Sledge Push/Pull',sets:3,reph:'—',nw:true,nr:true}]},
  ]},
  {id:'tue',day:'Tuesday',label:'Hypertrophy',sections:[
    {name:'Main lifts',exercises:[{name:'Bulgarian Split Squat',sets:3,reph:'10'},{name:'Seated Shoulder Press',sets:3,reph:'10'},{name:'Leg Press',sets:3,reph:'10'},{name:'Dumbbell Row',sets:3,reph:'10'}]},
    {name:'Accessory',exercises:[{name:'Russian Twist',sets:3,reph:'12',nw:true},{name:'Plank Drag',sets:3,reph:'12',nw:true}]},
  ]},
  {id:'wed',day:'Wednesday',label:'Active Recovery',rest:true,restType:'recovery'},
  {id:'thu',day:'Thursday',label:'Strength & Power',sections:[
    {name:'Main lifts',exercises:[{name:'Romanian Deadlift',sets:4,reph:'8'},{name:'Arnold Press',sets:4,reph:'8'},{name:'Goblet Squat',sets:4,reph:'8'},{name:'Face Pull',sets:4,reph:'8'}]},
    {name:'Accessory',exercises:[{name:'TRX Pull-Ups',sets:3,reph:'12',nw:true},{name:'Hyperextension',sets:3,reph:'12'}]},
  ]},
  {id:'fri',day:'Friday',label:'Hypertrophy',sections:[
    {name:'Main lifts',exercises:[{name:'Inner Thigh Machine',sets:3,reph:'10-12'},{name:'Triceps Extension Machine',sets:3,reph:'10-12'},{name:'Outer Thigh Machine',sets:3,reph:'10-12'},{name:'Lat Pulldown',sets:3,reph:'10'}]},
    {name:'Accessory',exercises:[{name:'Seated Leg Curl',sets:3,reph:'8'},{name:'Pallof Press',sets:3,reph:'10'}]},
  ]},
  {id:'sat',day:'Saturday',label:'Rest',rest:true,restType:'rest'},
  {id:'sun',day:'Sunday',label:'Rest',rest:true,restType:'rest'},
];

var curTab='today',activeW=null,histId=null,ringChart=null,charts={};
var viewDate=todayKey();
var calYear=new Date().getFullYear(),calMonth=new Date().getMonth(),calSelDate=todayKey();
var dayStatusTarget=null,addExSI=0,addExSets=3;
var mealTarget={date:null,slotId:null};

function todayKey(){var d=new Date();return fmtKey(d);}
function fmtKey(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function p2(n){return String(n).padStart(2,'0');}
function parseKey(k){var p=k.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}
function fmtDate(iso){var d=parseKey(iso);return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}
function fmtDateLong(iso){var d=parseKey(iso);return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
function isToday(k){return k===todayKey();}
function isFuture(k){return k>todayKey();}
function isTooEarly(k){return k<MIN_DATE;}

function goTab(t){
  curTab=t;
  ['today','calendar','history','progress'].forEach(function(x){
    document.getElementById('scr-'+x).classList.toggle('on',x===t);
    document.getElementById('tab-'+x).classList.toggle('on',x===t);
  });
  document.getElementById('scr-log').classList.remove('on');
  document.getElementById('fab').style.display=(t==='progress')?'none':'flex';
  if(t==='today')renderToday();
  if(t==='calendar')renderCalendar();
  if(t==='history')renderHistory();
  if(t==='progress')renderProgress();
}

// ── DATE NAV ─────────────────────────
function updateDateNav(){
  var lbl=document.getElementById('dnav-lbl');
  var d=parseKey(viewDate);
  if(isToday(viewDate)){
    lbl.textContent='Today — '+d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    lbl.className='date-nav-lbl';
    document.getElementById('today-top-title').textContent='Today';
  } else {
    lbl.textContent=d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
    lbl.className='date-nav-lbl past-date';
    document.getElementById('today-top-title').textContent='Log day';
  }
  document.getElementById('dnav-prev').disabled=isTooEarly(prevDay(viewDate));
  document.getElementById('dnav-next').disabled=isToday(viewDate);
}
function prevDay(k){var d=parseKey(k);d.setDate(d.getDate()-1);return fmtKey(d);}
function nextDay(k){var d=parseKey(k);d.setDate(d.getDate()+1);return fmtKey(d);}
function shiftDay(dir){var nd=dir<0?prevDay(viewDate):nextDay(viewDate);if(isTooEarly(nd)||isFuture(nd))return;viewDate=nd;renderToday();}
function goToday(){viewDate=todayKey();renderToday();}

// ── TODAY ─────────────────────────────
function renderToday(){
  updateDateNav();
  var tk=viewDate;
  var steps=db.steps[tk]||0;
  var pct=Math.min(100,Math.round(steps/STEPS_GOAL*100));
  var dayW=db.workouts.filter(function(w){return w.date===tk;});
  var status=db.dayStatus[tk];
  var html='';

  // Status banner
  if(status){
    var sm=statusMeta(status);
    html+='<div style="display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 14px;margin-top:6px;margin-bottom:10px">';
    html+='<span class="chip '+sm.cls+'">'+sm.icon+' '+sm.label+'</span>';
    html+='<span style="font-size:12px;color:var(--blue);cursor:pointer" onclick="openDayStatusModal(\''+tk+'\')">Change</span>';
    html+='</div>';
  }

  // Sleep
  html+=renderSleepSection(tk);

  // Feelings
  html+=renderFeelingsSection(tk);

  // Steps
  html+='<div class="slbl">Steps</div>';
  html+='<div class="card crt" onclick="openStepsModal()" style="cursor:pointer"><div class="card-body">';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  html+='<div><div style="font-size:28px;font-weight:500;font-family:var(--mono)">'+steps.toLocaleString()+'</div>';
  html+='<div style="font-size:12px;color:var(--muted);margin-top:2px">of '+STEPS_GOAL.toLocaleString()+' goal</div></div>';
  html+='<span class="chip '+(pct>=100?'cg':pct>=50?'ca':'cm')+'">'+pct+'%</span>';
  html+='</div><div class="prog-wrap"><div class="prog-bar" style="width:'+pct+'%"></div></div></div></div>';

  // Workout
  html+='<div class="slbl">Workout</div>';
  if(dayW.length){dayW.forEach(function(w){html+=wktCard(w,true);});}
  else{html+='<div style="font-size:13px;color:var(--hint);margin-bottom:8px">No workout logged</div>';}
  if(!status){
    html+='<div style="display:flex;gap:8px;margin-bottom:10px">';
    html+='<button class="btn btn-out btn-sm" onclick="openDayStatusModal(\''+tk+'\')">🤒 Sick</button>';
    html+='<button class="btn btn-out btn-sm" onclick="openDayStatusModal(\''+tk+'\')">✈️ Travel</button>';
    html+='<button class="btn btn-out btn-sm" onclick="openDayStatusModal(\''+tk+'\')">😴 Rest</button>';
    html+='</div>';
  }

  // Plan quick start
  html+='<div class="card">';
  PLAN.forEach(function(p){
    if(p.rest){
      html+='<div class="card-row" style="opacity:.4"><div><div style="font-size:13px;font-weight:500">'+p.day+'</div><div style="font-size:11px;color:var(--muted);margin-top:1px">'+p.label+'</div></div><span class="chip cm">'+(p.restType==='recovery'?'Recovery':'Rest')+'</span></div>';
    } else {
      html+='<div class="card-row crt" onclick="quickStart(\''+p.id+'\')"><div><div style="font-size:13px;font-weight:500">'+p.day+'</div><div style="font-size:11px;color:var(--muted);margin-top:1px">'+p.label+'</div></div><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M5.5 3.5l4 4-4 4" stroke="var(--hint)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>';
    }
  });
  html+='</div>';

  // Meals
  html+=renderMealsSection(tk);

  document.getElementById('today-body').innerHTML=html;
}

function statusMeta(s){
  var m={sick:{cls:'cr',icon:'🤒',label:'Sick'},linasick:{cls:'cpk',icon:'👶',label:'Lina sick'},travel:{cls:'cp',icon:'✈️',label:'Travel'},rest:{cls:'cm',icon:'😴',label:'Rest'},active:{cls:'ca',icon:'🏃',label:'Active recovery'}};
  return m[s]||{cls:'cm',icon:'',label:s};
}

// ── SLEEP ─────────────────────────────
function renderSleepSection(tk){
  var s=db.sleep[tk]||{};
  var hrs=s.hours||null;
  var q=s.quality||0;
  var html='<div class="slbl">Sleep</div>';
  html+='<div class="card"><div class="card-body">';
  html+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">';
  // Hours
  html+='<div style="flex:1">';
  html+='<div style="font-size:11px;color:var(--muted);margin-bottom:6px">Hours slept</div>';
  html+='<div style="display:flex;align-items:center;gap:8px">';
  html+='<input class="inp" type="number" inputmode="decimal" step="0.5" min="0" max="24" placeholder="hrs" value="'+(hrs||'')+'" style="max-width:80px" oninput="saveSleepHours(\''+tk+'\',this.value)">';
  if(hrs){html+='<span style="font-size:22px;font-weight:500;font-family:var(--mono)">'+hrs+'<span style="font-size:13px;color:var(--muted);margin-left:2px">h</span></span>';}
  html+='</div></div>';
  // Quality
  html+='<div style="flex:1">';
  html+='<div style="font-size:11px;color:var(--muted);margin-bottom:6px">Quality</div>';
  html+='<div style="display:flex;gap:5px">';
  for(var i=1;i<=5;i++){
    var sel=q===i;
    html+='<button style="flex:1;padding:7px 2px;border-radius:var(--rxs);border:'+(sel?'2px solid var(--border2)':'1px solid var(--border)')+';background:'+(sel?'var(--surface)':'var(--surface2)')+';font-size:15px;cursor:pointer" onclick="saveSleepQuality(\''+tk+'\','+i+')" title="'+SLEEP_QUALITY_LABELS[i]+'">'+SLEEP_QUALITY[i]+'</button>';
  }
  html+='</div>';
  if(q){html+='<div style="font-size:11px;color:var(--muted);margin-top:4px;text-align:center">'+SLEEP_QUALITY_LABELS[q]+'</div>';}
  html+='</div>';
  html+='</div>';
  html+='</div></div>';
  return html;
}
function saveSleepHours(tk,val){
  if(!db.sleep[tk])db.sleep[tk]={};
  db.sleep[tk].hours=val?parseFloat(val):null;
  save();
}
function saveSleepQuality(tk,val){
  if(!db.sleep[tk])db.sleep[tk]={};
  if(db.sleep[tk].quality===val){db.sleep[tk].quality=0;}
  else{db.sleep[tk].quality=val;}
  save();renderToday();
}

// ── FEELINGS ─────────────────────────
function renderFeelingsSection(tk){
  var f=db.feelings[tk]||{};
  var periods=['morning','afternoon','evening'];
  var html='<div class="slbl">Feelings</div>';
  html+='<div class="card"><div class="card-body" style="padding-bottom:4px">';
  periods.forEach(function(period){
    var cur=f[period]||0;
    html+='<div class="mood-row">';
    html+='<div class="mood-time">'+period.charAt(0).toUpperCase()+period.slice(1)+'</div>';
    html+='<div class="mood-btns">';
    for(var i=1;i<=5;i++){
      var sel=cur===i;
      html+='<button class="mood-btn'+(sel?' sel sel-'+i:'')+'" onclick="setMood(\''+tk+'\',\''+period+'\','+i+')" title="'+MOOD_LABELS[i]+'">'+MOOD_EMOJI[i]+'</button>';
    }
    html+='</div>';
    if(cur){html+='<span style="font-size:11px;color:var(--muted);margin-left:6px;flex-shrink:0">'+MOOD_LABELS[cur]+'</span>';}
    html+='</div>';
  });
  // Notes
  var note=f.note||'';
  html+='<textarea class="inp-full" rows="2" placeholder="How are you feeling today?" style="margin-top:10px;margin-bottom:4px" oninput="saveFeelingNote(\''+tk+'\',this.value)">'+note+'</textarea>';
  html+='</div></div>';
  return html;
}
function setMood(tk,period,val){
  if(!db.feelings[tk])db.feelings[tk]={};
  if(db.feelings[tk][period]===val){db.feelings[tk][period]=0;}
  else{db.feelings[tk][period]=val;}
  save();renderToday();
}
function saveFeelingNote(tk,val){
  if(!db.feelings[tk])db.feelings[tk]={};
  db.feelings[tk].note=val;
  save();
}

// ── MEALS ────────────────────────────
function renderMealsSection(tk){
  var meals=db.meals[tk]||{};
  var html='<div class="slbl">Meals</div>';

  // Water intake
  var water=db.meals[tk]&&db.meals[tk]._water||0;
  html+='<div class="card" style="margin-bottom:8px"><div class="card-body" style="padding:12px 16px">';
  html+='<div style="display:flex;align-items:center;justify-content:space-between">';
  html+='<div style="display:flex;align-items:center;gap:10px">';
  html+='<span style="font-size:18px">💧</span>';
  html+='<div><div style="font-size:13px;font-weight:500">Water</div><div style="font-size:11px;color:var(--muted);margin-top:1px">Goal: 2.0 L</div></div>';
  html+='</div>';
  html+='<div style="display:flex;align-items:center;gap:8px">';
  html+='<button style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center" onclick="adjustWater(\''+tk+'\',-0.25)">−</button>';
  html+='<span style="font-family:var(--mono);font-size:15px;font-weight:500;min-width:40px;text-align:center">'+(water||0).toFixed(2).replace(/\.?0+$/,'')+'L</span>';
  html+='<button style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center" onclick="adjustWater(\''+tk+'\',0.25)">+</button>';
  html+='</div></div>';
  var wpct=Math.min(100,Math.round(water/2*100));
  html+='<div style="margin-top:8px"><div style="height:3px;background:var(--surface3);border-radius:2px"><div style="height:3px;background:'+(wpct>=100?'var(--green)':'var(--blue)')+';border-radius:2px;width:'+wpct+'%;transition:width .3s"></div></div></div>';
  html+='</div></div>';

  MEAL_SLOTS.forEach(function(slot){
    var m=meals[slot.id]||{};
    var hasData=m.food||m.cal||m.protein;
    html+='<div class="meal-slot">';
    html+='<div class="meal-slot-head" onclick="toggleMealSlot(\'ms-'+slot.id+'\')">';
    html+='<div>';
    html+='<div style="display:flex;align-items:center;gap:8px"><span class="meal-slot-name">'+slot.name+'</span>';
    if(hasData){
      if(m.cal)html+='<span class="chip ct">'+m.cal+' kcal</span>';
      if(m.protein)html+='<span class="chip cg">'+m.protein+'g P</span>';
    }
    html+='</div>';
    html+='<div class="meal-slot-time">'+slot.time+'</div>';
    html+='</div>';
    html+='<svg width="14" height="14" viewBox="0 0 14 14" fill="none" id="ms-arr-'+slot.id+'"><path d="M3 5l4 4 4-4" stroke="var(--hint)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    html+='</div>';
    html+='<div class="meal-body" id="ms-'+slot.id+'">';
    if(m.food){html+='<div style="font-size:13px;color:var(--muted);margin-top:10px;line-height:1.5">'+m.food+'</div>';}
    html+='<div style="display:flex;gap:6px;margin-top:10px">';
    html+='<button class="btn btn-out btn-sm" onclick="openMealModal(\''+tk+'\',\''+slot.id+'\',\''+slot.name+'\')">'+( hasData?'Edit meal':'+ Log meal')+'</button>';
    html+='</div>';
    html+='</div>';
    html+='</div>';
  });

  // Daily macro totals
  var totCal=0,totPro=0,totCarb=0,totFat=0;
  Object.entries(db.meals[tk]||{}).forEach(function(e){
    if(e[0]==='_water')return;
    var m=e[1];
    totCal+=parseFloat(m.cal||0);totPro+=parseFloat(m.protein||0);totCarb+=parseFloat(m.carbs||0);totFat+=parseFloat(m.fat||0);
  });
  if(totCal||totPro){
    html+='<div class="card"><div class="card-body" style="padding-top:10px;padding-bottom:10px">';
    html+='<div style="font-size:11px;color:var(--hint);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Daily totals</div>';
    html+='<div class="macro-grid" style="padding:0">';
    html+='<div class="macro-cell"><div class="macro-val">'+Math.round(totCal)+'</div><div class="macro-lbl">kcal</div></div>';
    html+='<div class="macro-cell"><div class="macro-val">'+Math.round(totPro)+'g</div><div class="macro-lbl">Protein</div></div>';
    html+='<div class="macro-cell"><div class="macro-val">'+Math.round(totCarb)+'g</div><div class="macro-lbl">Carbs</div></div>';
    html+='<div class="macro-cell"><div class="macro-val">'+Math.round(totFat)+'g</div><div class="macro-lbl">Fat</div></div>';
    html+='</div></div></div>';
  }
  return html;
}

function adjustWater(tk,delta){

  db.meals[tk]._water=Math.max(0,Math.round((cur+delta)*100)/100);
  save();renderToday();
}

function renderLog(){
  var w=activeW;
  document.getElementById('log-title').textContent=w.name;
  ['today','calendar','history','progress'].forEach(function(t){document.getElementById('scr-'+t).classList.remove('on');});
  document.getElementById('scr-log').classList.add('on');
  document.getElementById('fab').style.display='none';
  document.getElementById('log-save-btn').onclick=saveWorkout;
  var html='';
  w.sections.forEach(function(sec,si){
    html+='<div class="slbl">'+sec.name+'</div>';
    sec.exercises.forEach(function(ex,ei){
      var eid=si+'_'+ei;
      if(!w.sets[eid])w.sets[eid]=Array.from({length:ex.sets},function(){return{w:'',r:'',done:false};});
      var allDone=w.sets[eid].every(function(s){return s.done;});
      html+='<div class="card" id="ec_'+eid+'" style="margin-bottom:8px;border-color:'+(allDone?'var(--green-bd)':'var(--border)')+'\">';
      html+='<div class="card-body" style="padding-bottom:8px"><div style="font-size:14px;font-weight:500">'+ex.name+'</div></div>';
      html+='<div class="sets-hd"><span class="sh"></span><span class="sh">'+(ex.nw?'':'kg')+'</span><span class="sh">reps</span><span class="sh"></span></div>';
      for(var s=0;s<ex.sets;s++){
        var sv=w.sets[eid][s];
        html+='<div class="set-row"><span class="sn">S'+(s+1)+'</span>';
        html+=ex.nw?'<span></span>':'<input class="inp" type="number" inputmode="decimal" step="0.5" placeholder="kg" value="'+sv.w+'" data-e="'+eid+'" data-s="'+s+'" data-f="w" onchange="setv(this)">';
        html+=ex.nr?'<span></span>':'<input class="inp" type="number" inputmode="numeric" step="1" placeholder="'+ex.reph+'" value="'+sv.r+'" data-e="'+eid+'" data-s="'+s+'" data-f="r" onchange="setv(this)">';
        html+='<button class="tick'+(sv.done?' done':'')+'" data-e="'+eid+'" data-s="'+s+'" onclick="toggleTick(this)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5L12 3.5" stroke="'+(sv.done?'var(--green)':'var(--hint)')+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>';
      }
      html+='<div style="padding:6px 16px 12px"><button class="btn btn-out btn-sm" onclick="addSet(\''+eid+'\','+si+','+ei+')">+ Set</button></div>';
      html+='</div>';
    });
    html+='<button class="btn btn-out btn-sm" style="margin-bottom:4px" onclick="addEx('+si+')">+ Exercise</button>';
  });
  document.getElementById('log-body').innerHTML=html;
}
function setv(el){var e=el.dataset.e,s=parseInt(el.dataset.s),f=el.dataset.f;activeW.sets[e][s][f]=el.value;}
function toggleTick(btn){
  var e=btn.dataset.e,s=parseInt(btn.dataset.s);
  var sv=activeW.sets[e][s];sv.done=!sv.done;
  btn.classList.toggle('done',sv.done);
  btn.querySelector('path').setAttribute('stroke',sv.done?'var(--green)':'var(--hint)');
  var allDone=activeW.sets[e].every(function(x){return x.done;});
  var card=document.getElementById('ec_'+e);
  if(card)card.style.borderColor=allDone?'var(--green-bd)':'var(--border)';
}
function addSet(eid,si,ei){activeW.sets[eid].push({w:'',r:'',done:false});activeW.sections[si].exercises[ei].sets++;renderLog();}

function wktCard(w,clickable){
  var chipCls=w.type==='cardio'?'cb':w.type==='wellness'?'cm':w.type==='plan'?'cg':'ca';
  var chipLbl=w.type==='cardio'?'Cardio':w.type==='wellness'?'Wellness':w.type==='plan'?'Plan':'Strength';
  var html='<div class="card'+(clickable?' crt':'')+'" '+(clickable?'onclick="viewWkt(\''+w.id+'\')"':'')+' style="margin-bottom:10px"><div class="card-body">';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px"><div style="font-size:14px;font-weight:500">'+w.name+'</div><span class="chip '+chipCls+'">'+chipLbl+'</span></div>';
  if(w.type==='cardio'&&w.cardio){var c=w.cardio;html+='<div style="font-size:12px;color:var(--muted)">'+[c.dist?c.dist+'km':'',c.duration?Math.round(c.duration/60)+"'min":'',c.pace?c.pace+'/km':''].filter(Boolean).join(' · ')+'</div>';}
  else if(w.type==='wellness'&&w.wellness){html+='<div style="font-size:12px;color:var(--muted)">'+(w.wellness.duration?Math.round(w.wellness.duration/60)+' min':'')+'</div>';}
  else{html+='<div style="font-size:12px;color:var(--green)">Completed</div>';}
  html+='</div></div>';
  return html;
}

// ── CALENDAR ─────────────────────────
function renderCalendar(){
  var today=todayKey(),yr=calYear,mo=calMonth;
  var mnames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-lbl').textContent=mnames[mo]+' '+yr;
  var now=new Date();
  document.getElementById('cal-next-btn').disabled=(yr>now.getFullYear()||(yr===now.getFullYear()&&mo>=now.getMonth()));
  var firstDay=new Date(yr,mo,1).getDay();
  var daysInMonth=new Date(yr,mo+1,0).getDate();
  var startOffset=(firstDay+6)%7;
  var dow=['M','T','W','T','F','S','S'];
  var html='';
  dow.forEach(function(d){html+='<div class="cal-dow">'+d+'</div>';});
  for(var i=0;i<startOffset;i++)html+='<div class="cal-day empty"></div>';
  for(var d=1;d<=daysInMonth;d++){
    var k=yr+'-'+p2(mo+1)+'-'+p2(d);
    var isT=k===today,isSel=k===calSelDate;
    var future=k>today,tooEarly=k<MIN_DATE;
    var hasW=db.workouts.some(function(w){return w.date===k;});
    var status=db.dayStatus[k];
    var hasMood=db.feelings[k]&&(db.feelings[k].morning||db.feelings[k].afternoon||db.feelings[k].evening);
    var cls='cal-day'+(isT?' today':'')+(isSel&&!isT?' selected':'')+(future?' future':'')+(tooEarly?' pre-jan':'');
    html+='<div class="'+cls+'" onclick="selectCalDay(\''+k+'\')">';
    html+='<span class="cal-dn">'+d+'</span>';
    html+='<div class="cal-dots">';
    if(hasW)html+='<span class="cal-dot" style="background:var(--green)"></span>';
    if(status==='sick')html+='<span class="cal-dot" style="background:var(--red)"></span>';
    if(status==='linasick')html+='<span class="cal-dot" style="background:var(--pink)"></span>';
    if(status==='travel')html+='<span class="cal-dot" style="background:var(--purple)"></span>';
    if(status==='rest'||status==='active')html+='<span class="cal-dot" style="background:var(--amber)"></span>';
    if(hasMood)html+='<span class="cal-dot" style="background:var(--teal)"></span>';
    html+='</div></div>';
  }
  document.getElementById('cal-grid').innerHTML=html;
  renderCalDetail(calSelDate);
}
function selectCalDay(k){if(k>todayKey()||k<MIN_DATE)return;calSelDate=k;renderCalendar();}
function shiftMonth(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  renderCalendar();
}
function renderCalDetail(k){
  var detail=document.getElementById('cal-detail');
  var html='<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0 8px">';
  html+='<div style="font-size:13px;font-weight:500">'+fmtDateLong(k)+'</div>';
  var steps=db.steps[k];
  if(steps)html+='<span class="chip cm">'+steps.toLocaleString()+' 👟</span>';
  html+='</div>';
  var status=db.dayStatus[k];
  if(status){
    var sm=statusMeta(status);
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span class="chip '+sm.cls+'">'+sm.icon+' '+sm.label+'</span>';
    html+='<span style="font-size:12px;color:var(--blue);cursor:pointer" onclick="openDayStatusModal(\''+k+'\')">Change</span></div>';
  } else if(k<=todayKey()&&k>=MIN_DATE){
    html+='<div style="display:flex;gap:6px;margin-bottom:10px">';
    html+='<button class="btn btn-out btn-sm" onclick="openDayStatusModal(\''+k+'\')">🤒 Sick</button>';
    html+='<button class="btn btn-out btn-sm" onclick="openDayStatusModal(\''+k+'\')">👶 Lina</button>';
    html+='<button class="btn btn-out btn-sm" onclick="openDayStatusModal(\''+k+'\')">✈️ Travel</button>';
    html+='</div>';
  }
  // Mood summary
  var f=db.feelings[k]||{};
  if(f.morning||f.afternoon||f.evening){
    html+='<div style="display:flex;gap:8px;margin-bottom:10px">';
    ['morning','afternoon','evening'].forEach(function(p){if(f[p])html+='<span class="chip ct">'+p.slice(0,3)+' '+MOOD_EMOJI[f[p]]+'</span>';});
    html+='</div>';
  }
  var dayW=db.workouts.filter(function(w){return w.date===k;});
  if(dayW.length){dayW.forEach(function(w){html+=wktCard(w,true);});}
  else{html+='<div style="font-size:13px;color:var(--hint);padding:4px 0 8px">No workouts</div>';}
  if(k<=todayKey()&&k>=MIN_DATE){html+='<button class="btn btn-out" style="margin-top:4px" onclick="logForDate(\''+k+'\')">+ Log workout</button>';}
  detail.innerHTML=html;
}
function logForDate(k){viewDate=k;goTab('today');setTimeout(openNewModal,150);}

// ── HISTORY ──────────────────────────
function renderHistory(){
  var body=document.getElementById('hist-body');
  if(!db.workouts.length){body.innerHTML='<div class="empty"><svg width="40" height="40" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="15" stroke="#b0b0ae" stroke-width="1.5"/><path d="M20 12v8l5 5" stroke="#b0b0ae" stroke-width="1.5" stroke-linecap="round"/></svg><div class="empty-txt">No workouts logged yet</div></div>';return;}
  var grp={};
  db.workouts.forEach(function(w){if(!grp[w.date])grp[w.date]=[];grp[w.date].push(w);});
  var dates=Object.keys(grp).sort().reverse();
  var html='';
  dates.forEach(function(d){
    html+='<div class="slbl">'+fmtDate(d)+'</div><div class="card">';
    grp[d].forEach(function(w){
      var sets=w.sets||{},tot=0,vol=0;
      Object.values(sets).forEach(function(a){a.forEach(function(s){if(s.r){tot++;if(s.w)vol+=parseFloat(s.w)*parseFloat(s.r);}});});
      var cc=w.type==='cardio'?'cb':w.type==='wellness'?'cm':w.type==='plan'?'cg':'ca';
      var cl=w.type==='cardio'?'Cardio':w.type==='wellness'?'Wellness':w.type==='plan'?'Plan':'Strength';
      html+='<div class="hrow" onclick="viewWkt(\''+w.id+'\')">';
      html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px"><div style="font-size:14px;font-weight:500">'+w.name+'</div><span class="chip '+cc+'">'+cl+'</span></div>';
      if(w.type==='cardio'&&w.cardio){var c=w.cardio;html+='<div style="font-size:12px;color:var(--muted)">'+[c.dist?c.dist+'km':'',c.duration?Math.round(c.duration/60)+"'":'',c.pace?c.pace+'/km':''].filter(Boolean).join(' · ')+'</div>';}
      else if(w.type==='wellness'&&w.wellness){html+='<div style="font-size:12px;color:var(--muted)">'+(w.wellness.duration?Math.round(w.wellness.duration/60)+' min':'')+'</div>';}
      else{html+='<div style="font-size:12px;color:var(--muted)">'+tot+' sets'+(vol?' · '+Math.round(vol)+'kg vol':'')+(w.duration?' · '+Math.round(w.duration/60)+"'":'')+'</div>';}
      html+='</div>';
    });
    html+='</div>';
  });
  body.innerHTML=html;
}
function viewWkt(id){
  histId=id;var w=db.workouts.find(function(x){return x.id===id;});if(!w)return;
  var html='<div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:4px">'+fmtDate(w.date)+'</div>';
  html+='<div style="font-size:17px;font-weight:500;margin-bottom:14px">'+w.name+'</div>';
  if(w.type==='cardio'&&w.cardio){
    var c=w.cardio;
    html+='<div class="card"><div class="cgrid"><div class="cstat"><div class="cval">'+(c.dist||'—')+'</div><div class="clbl">km</div></div><div class="cstat"><div class="cval">'+(c.duration?Math.round(c.duration/60):'—')+'</div><div class="clbl">min</div></div><div class="cstat"><div class="cval">'+(c.pace||'—')+'</div><div class="clbl">/km</div></div><div class="cstat"><div class="cval">'+(c.cal||'—')+'</div><div class="clbl">kcal</div></div></div></div>';
    if(c.notes)html+='<div style="font-size:13px;color:var(--muted);margin-top:8px">'+c.notes+'</div>';
  } else if(w.type==='wellness'&&w.wellness){
    html+='<div class="card"><div class="card-body">';
    if(w.wellness.duration)html+='<div style="font-size:28px;font-weight:500;font-family:var(--mono)">'+Math.round(w.wellness.duration/60)+'<span style="font-size:14px;color:var(--muted);margin-left:4px">min</span></div>';
    if(w.wellness.notes)html+='<div style="font-size:13px;color:var(--muted);margin-top:8px">'+w.wellness.notes+'</div>';
    html+='</div></div>';
  } else if(w.sections&&w.sets){
    w.sections.forEach(function(sec,si){
      html+='<div class="slbl">'+sec.name+'</div>';
      sec.exercises.forEach(function(ex,ei){
        var eid=si+'_'+ei,sv=w.sets[eid]||[];
        var logged=sv.filter(function(s){return s.r;});
        if(!logged.length)return;
        html+='<div class="card" style="margin-bottom:8px"><div class="card-body" style="padding-bottom:8px"><div style="font-size:13px;font-weight:500;margin-bottom:8px">'+ex.name+'</div>';
        logged.forEach(function(s,i){html+='<div style="display:flex;gap:10px;font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:3px"><span style="color:var(--hint)">S'+(i+1)+'</span><span>'+(s.w?s.w+'kg':'BW')+' × '+s.r+' reps</span></div>';});
        html+='</div></div>';
      });
    });
  }
  document.getElementById('m-hist-content').innerHTML=html;
  openM('m-hist');
}
function deleteWkt(){if(!histId)return;db.workouts=db.workouts.filter(function(w){return w.id!==histId;});save();closeM('m-hist');renderHistory();toast('Deleted');}

// ── PROGRESS ─────────────────────────
function renderProgress(){
  var body=document.getElementById('prog-body');
  var html='';
  html+='<div class="slbl">Steps — last 14 days</div><div class="chart-wrap"><div class="chart-canvas"><canvas id="ch-steps"></canvas></div></div>';
  html+='<div class="slbl">Sleep — last 14 days</div><div class="chart-wrap"><div class="chart-canvas"><canvas id="ch-sleep"></canvas></div></div>';
  html+='<div class="slbl">Mood — last 14 days</div><div class="chart-wrap"><div class="chart-canvas"><canvas id="ch-mood"></canvas></div></div>';
  var exVol={};
  db.workouts.filter(function(w){return w.type!=='cardio'&&w.type!=='wellness'&&w.sections&&w.sets;}).forEach(function(w){
    w.sections.forEach(function(sec,si){sec.exercises.forEach(function(ex,ei){
      var eid=si+'_'+ei,sv=w.sets[eid]||[],v=0;
      sv.forEach(function(s){if(s.w&&s.r)v+=parseFloat(s.w)*parseFloat(s.r);});
      if(!v)return;
      if(!exVol[ex.name])exVol[ex.name]=[];
      exVol[ex.name].push({date:w.date,v:Math.round(v)});
    });});
  });
  var topEx=Object.keys(exVol).filter(function(n){return exVol[n].length>=2;}).sort(function(a,b){return exVol[b].length-exVol[a].length;}).slice(0,4);
  if(topEx.length){
    html+='<div class="slbl">Volume per exercise</div>';
    topEx.forEach(function(n,i){html+='<div class="chart-wrap"><div class="chart-title">'+n+'</div><div class="chart-canvas"><canvas id="ch-ex'+i+'"></canvas></div></div>';});
  }
  var cardioW=db.workouts.filter(function(w){return w.type==='cardio'&&w.cardio&&w.cardio.dist;});
  if(cardioW.length>=2){html+='<div class="slbl">Cardio distance</div><div class="chart-wrap"><div class="chart-canvas"><canvas id="ch-cardio"></canvas></div></div>';}
  html+='<div class="slbl">Workouts per week</div><div class="chart-wrap"><div class="chart-canvas"><canvas id="ch-freq"></canvas></div></div>';
  if(!db.workouts.length&&!Object.keys(db.steps).length){body.innerHTML='<div class="empty"><svg width="40" height="40" viewBox="0 0 40 40" fill="none"><path d="M6 30l8-10 8 6 8-14" stroke="#b0b0ae" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><div class="empty-txt">Log workouts to see progress</div></div>';return;}
  body.innerHTML=html;
  // Steps
  var last14=[],moodData=[],sleepData=[];
  for(var i=13;i>=0;i--){
    var dd=new Date();dd.setDate(dd.getDate()-i);
    var k=fmtKey(dd);
    var lbl=dd.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    last14.push({l:lbl,v:db.steps[k]||0});
    var f=db.feelings[k]||{};
    var vals=[f.morning,f.afternoon,f.evening].filter(Boolean);
    moodData.push({l:lbl,v:vals.length?Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length*10)/10:null});
    var sl=db.sleep[k]||{};
    sleepData.push({l:lbl,v:sl.hours||null});
  }
  mkBar('ch-steps',last14.map(function(x){return x.l;}),last14.map(function(x){return x.v;}),STEPS_GOAL);
  mkLine('ch-sleep',sleepData.map(function(x){return x.l;}),sleepData.map(function(x){return x.v;}),true,12);
  mkLine('ch-mood',moodData.map(function(x){return x.l;}),moodData.map(function(x){return x.v;}),true,5);
  topEx.forEach(function(n,i){
    var pts=exVol[n].slice().sort(function(a,b){return a.date.localeCompare(b.date);});
    mkLine('ch-ex'+i,pts.map(function(p){return fmtDate(p.date);}),pts.map(function(p){return p.v;}));
  });
  if(cardioW.length>=2){
    var sc=cardioW.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
    mkLine('ch-cardio',sc.map(function(w){return fmtDate(w.date);}),sc.map(function(w){return parseFloat(w.cardio.dist);}));
  }
  var wkMap={};
  db.workouts.forEach(function(w){
    var d=parseKey(w.date),start=new Date(d.getFullYear(),0,1);
    var wk=Math.ceil(((d-start)/86400000+start.getDay()+1)/7);
    var key=d.getFullYear()+'W'+p2(wk);
    wkMap[key]=(wkMap[key]||0)+1;
  });
  var wks=Object.keys(wkMap).sort().slice(-8);
  mkBar('ch-freq',wks.map(function(w){return 'W'+w.slice(-2);}),wks.map(function(w){return wkMap[w];}),null);
}
function chartOpts(maxY){var o={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return ''+c.raw;}}}},scales:{x:{grid:{display:false},ticks:{font:{family:"'Geist Mono',monospace",size:10},color:'#b0b0ae',maxRotation:0,maxTicksLimit:7}},y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{family:"'Geist Mono',monospace",size:10},color:'#b0b0ae'},beginAtZero:true}}};if(maxY)o.scales.y.max=maxY;return o;}
function mkLine(id,labels,data,spanGaps,maxY){var ctx=document.getElementById(id);if(!ctx)return;if(charts[id])charts[id].destroy();charts[id]=new Chart(ctx,{type:'line',data:{labels:labels,datasets:[{data:data,borderColor:'#1a1a18',borderWidth:1.5,pointRadius:3,pointBackgroundColor:'#1a1a18',tension:.3,fill:true,backgroundColor:'rgba(26,26,24,.05)',spanGaps:!!spanGaps}]},options:chartOpts(maxY)});}
function mkBar(id,labels,data,refVal){var ctx=document.getElementById(id);if(!ctx)return;if(charts[id])charts[id].destroy();charts[id]=new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[{data:data,backgroundColor:data.map(function(v){return refVal&&v>=refVal?'#2d7d52':'#1a1a18';}),borderRadius:3,borderSkipped:false}]},options:chartOpts()});}

renderToday();
</script>
